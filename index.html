<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Interior Design Assistant</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --sand: #F5F0E8;
    --warm-white: #FAF8F5;
    --charcoal: #2C2A27;
    --muted: #7A7670;
    --border: #E5E0D8;
    --accent: #B8A98A;
    --gold: #C9A84C;
    --low: #4A7C59;
    --high: #8B5E3C;
    --tag-bg: #EDE8DF;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--warm-white);
    color: var(--charcoal);
    min-height: 100vh;
    font-size: 15px;
    line-height: 1.6;
  }

  header {
    background: var(--charcoal);
    color: white;
    padding: 2.5rem 2rem 2rem;
    text-align: center;
  }
  header h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 2.4rem;
    font-weight: 500;
    letter-spacing: 0.02em;
    margin-bottom: 0.4rem;
  }
  header p {
    color: #B8B4AD;
    font-size: 0.9rem;
    font-weight: 300;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }

  .container { max-width: 860px; margin: 0 auto; padding: 2.5rem 1.5rem 4rem; }

  /* Upload zone */
  .upload-zone {
    border: 1.5px dashed var(--accent);
    border-radius: 12px;
    padding: 3rem 2rem;
    text-align: center;
    background: var(--sand);
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
    position: relative;
  }
  .upload-zone:hover { border-color: var(--gold); background: #EFE9DE; }
  .upload-zone input[type=file] { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
  .upload-icon { font-size: 2.5rem; margin-bottom: 1rem; display: block; }
  .upload-zone h2 { font-family: 'Cormorant Garamond', serif; font-size: 1.5rem; font-weight: 500; margin-bottom: 0.5rem; }
  .upload-zone p { color: var(--muted); font-size: 0.875rem; }

  .preview-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 12px; margin-top: 1.5rem; }
  .preview-item { position: relative; border-radius: 8px; overflow: hidden; aspect-ratio: 1; border: 1px solid var(--border); }
  .preview-item img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .preview-item .rm { position: absolute; top: 6px; right: 6px; background: rgba(44,42,39,0.75); color: white; border: none; border-radius: 50%; width: 22px; height: 22px; cursor: pointer; font-size: 13px; line-height: 22px; text-align: center; }

  .analyze-btn {
    display: block;
    width: 100%;
    margin-top: 1.5rem;
    padding: 1rem;
    background: var(--charcoal);
    color: white;
    border: none;
    border-radius: 8px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    cursor: pointer;
    transition: background 0.2s;
  }
  .analyze-btn:hover { background: #3E3C38; }
  .analyze-btn:disabled { background: #9E9C98; cursor: not-allowed; }

  /* Loading */
  .loading { text-align: center; padding: 3rem; display: none; }
  .loading-dots { display: flex; justify-content: center; gap: 8px; margin-bottom: 1rem; }
  .loading-dots span { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); animation: pulse 1.4s ease-in-out infinite; }
  .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
  .loading-dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes pulse { 0%,80%,100%{opacity:0.3;transform:scale(0.9)} 40%{opacity:1;transform:scale(1)} }
  .loading p { color: var(--muted); font-size: 0.875rem; letter-spacing: 0.05em; text-transform: uppercase; }

  /* Results */
  .results { display: none; }
  .results-header { margin-bottom: 2rem; padding-bottom: 1.5rem; border-bottom: 1px solid var(--border); }
  .results-header h2 { font-family: 'Cormorant Garamond', serif; font-size: 1.8rem; font-weight: 500; margin-bottom: 0.3rem; }
  .results-header p { color: var(--muted); font-size: 0.875rem; }

  /* Room card */
  .room-section { margin-bottom: 3rem; }
  .room-header { display: flex; align-items: center; gap: 12px; margin-bottom: 1.25rem; padding-bottom: 1rem; border-bottom: 1px solid var(--border); }
  .room-img { width: 72px; height: 72px; object-fit: cover; border-radius: 8px; border: 1px solid var(--border); }
  .room-type { font-family: 'Cormorant Garamond', serif; font-size: 1.4rem; font-weight: 500; }
  .room-meta { font-size: 0.8rem; color: var(--muted); margin-top: 2px; }
  .room-elements { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 6px; }
  .tag { background: var(--tag-bg); color: var(--muted); font-size: 0.75rem; padding: 3px 10px; border-radius: 20px; }

  /* Item */
  .item-card { background: white; border: 1px solid var(--border); border-radius: 10px; margin-bottom: 1rem; overflow: hidden; }
  .item-header { padding: 1rem 1.25rem 0.75rem; display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; }
  .item-name { font-weight: 500; font-size: 0.975rem; margin-bottom: 2px; }
  .item-desc { color: var(--muted); font-size: 0.825rem; }
  .impact-badge { padding: 3px 10px; border-radius: 20px; font-size: 0.72rem; font-weight: 500; text-transform: uppercase; letter-spacing: 0.06em; white-space: nowrap; flex-shrink: 0; }
  .impact-high { background: #F9EDE6; color: var(--high); }
  .impact-medium { background: #F5F0E8; color: #7A6540; }
  .impact-low { background: #EBF4EF; color: var(--low); }

  .options-row { display: grid; grid-template-columns: 1fr 1fr; border-top: 1px solid var(--border); }
  .option { padding: 1rem 1.25rem; }
  .option:first-child { border-right: 1px solid var(--border); }
  .option-label { font-size: 0.7rem; font-weight: 500; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); margin-bottom: 8px; display: flex; align-items: center; gap: 6px; }
  .label-low { color: var(--low); }
  .label-high { color: var(--high); }
  .option-name { font-weight: 500; font-size: 0.9rem; margin-bottom: 3px; }
  .option-store { color: var(--muted); font-size: 0.8rem; margin-bottom: 6px; }
  .option-price { font-family: 'Cormorant Garamond', serif; font-size: 1.2rem; font-weight: 600; color: var(--charcoal); margin-bottom: 6px; }
  .option-search { background: var(--sand); border: none; border-radius: 6px; padding: 5px 10px; font-size: 0.75rem; color: var(--muted); cursor: pointer; font-family: 'DM Sans', sans-serif; transition: background 0.15s; display: block; width: 100%; text-align: left; word-break: break-word; }
  .option-search:hover { background: var(--border); }

  /* Monthly plan */
  .plan-section { margin-top: 3rem; }
  .plan-title { font-family: 'Cormorant Garamond', serif; font-size: 1.4rem; font-weight: 500; margin-bottom: 1.25rem; padding-bottom: 0.75rem; border-bottom: 1px solid var(--border); }
  .month-row { display: grid; grid-template-columns: 90px 1fr; gap: 1rem; margin-bottom: 1rem; align-items: start; }
  .month-label { font-family: 'Cormorant Garamond', serif; font-size: 1rem; font-weight: 600; color: var(--accent); padding-top: 0.1rem; }
  .month-items { display: flex; flex-direction: column; gap: 4px; }
  .month-item-chip { background: var(--tag-bg); border-radius: 6px; padding: 6px 12px; font-size: 0.85rem; display: flex; justify-content: space-between; align-items: center; }
  .chip-room { font-size: 0.75rem; color: var(--muted); }

  /* Error */
  .error-box { background: #FEF2F0; border: 1px solid #F4C3BB; border-radius: 8px; padding: 1rem 1.25rem; color: #8B3A2E; font-size: 0.875rem; margin-top: 1rem; display: none; }

  @media (max-width: 500px) {
    .options-row { grid-template-columns: 1fr; }
    .option:first-child { border-right: none; border-bottom: 1px solid var(--border); }
  }
</style>
</head>
<body>

<header>
  <h1>Interior Design Assistant</h1>
  <p>Upload your rooms · Get curated shopping recommendations</p>
</header>

<div class="container">
  <div class="upload-zone" id="dropZone">
    <input type="file" accept="image/*" multiple id="fileInput">
    <span class="upload-icon">🏠</span>
    <h2>Upload room photos</h2>
    <p>Drag & drop or click — up to 5 images (JPEG, PNG, WEBP)</p>
  </div>
  <div class="preview-grid" id="previewGrid"></div>
  <button class="analyze-btn" id="analyzeBtn" disabled>Analyze my rooms</button>
  <div class="error-box" id="errorBox"></div>

  <div class="loading" id="loading">
    <div class="loading-dots"><span></span><span></span><span></span></div>
    <p>Analyzing your spaces…</p>
  </div>

  <div class="results" id="results"></div>
</div>

<script>
const fileInput = document.getElementById('fileInput');
const previewGrid = document.getElementById('previewGrid');
const analyzeBtn = document.getElementById('analyzeBtn');
const loading = document.getElementById('loading');
const results = document.getElementById('results');
const errorBox = document.getElementById('errorBox');

let files = [];

fileInput.addEventListener('change', e => addFiles([...e.target.files]));

document.getElementById('dropZone').addEventListener('dragover', e => e.preventDefault());
document.getElementById('dropZone').addEventListener('drop', e => {
  e.preventDefault();
  addFiles([...e.dataTransfer.files].filter(f => f.type.startsWith('image/')));
});

function addFiles(newFiles) {
  newFiles.forEach(f => {
    if (files.length >= 5) return;
    files.push(f);
    const idx = files.length - 1;
    const div = document.createElement('div');
    div.className = 'preview-item';
    const img = document.createElement('img');
    img.src = URL.createObjectURL(f);
    const rm = document.createElement('button');
    rm.className = 'rm';
    rm.textContent = '×';
    rm.onclick = (e) => { e.stopPropagation(); files.splice(idx, 1); div.remove(); analyzeBtn.disabled = files.length === 0; };
    div.appendChild(img);
    div.appendChild(rm);
    previewGrid.appendChild(div);
  });
  analyzeBtn.disabled = files.length === 0;
}

function toBase64(file) {
  return new Promise((res, rej) => {
    const r = new FileReader();
    r.onload = () => res(r.result.split(',')[1]);
    r.onerror = rej;
    r.readAsDataURL(file);
  });
}

analyzeBtn.addEventListener('click', async () => {
  if (!files.length) return;
  analyzeBtn.disabled = true;
  loading.style.display = 'block';
  results.style.display = 'none';
  errorBox.style.display = 'none';
  results.innerHTML = '';

  try {
    const images = await Promise.all(files.map(async (f, i) => ({
      index: i,
      name: f.name,
      mediaType: f.type || 'image/jpeg',
      data: await toBase64(f)
    })));

    const imageContent = images.flatMap((img, i) => [
      { type: 'text', text: `Image ${i + 1} (filename: ${img.name}):` },
      { type: 'image', source: { type: 'base64', media_type: img.mediaType, data: img.data } }
    ]);

    const systemPrompt = `You are an expert interior design consultant specializing in accessible European home decor.
Analyze room photos and return ONLY a valid JSON object, no markdown, no code fences, no extra text.

Schema:
{
  "rooms": [
    {
      "image_index": 0,
      "room_type": "Living Room",
      "elements_present": ["sofa", "rug", "floor lamp", "coffee table"],
      "items_to_improve": [
        {
          "item": "Area rug",
          "reason": "Current rug lacks texture and warmth",
          "priority": "high",
          "options": {
            "low_cost": {
              "product_name": "STOENSE Rug low pile",
              "store": "IKEA",
              "price_range": "€49–€89",
              "search_query": "IKEA STOENSE low pile rug beige 160x230"
            },
            "high_cost": {
              "product_name": "Alfombra Boho Tufted Cotton",
              "store": "Zara Home",
              "price_range": "€159–€249",
              "search_query": "Zara Home tufted cotton rug boho natural 160x230"
            }
          }
        }
      ]
    }
  ],
  "monthly_plan": [
    {
      "month": "Month 1",
      "purchases": [
        { "room": "Living Room", "item": "Area rug", "option": "low_cost" }
      ]
    }
  ]
}

Rules:
- Analyze each image separately with its image_index (0-based)
- Max 5 items_to_improve per room, ordered by priority (high/medium/low)
- Suggest REAL product names from IKEA, Zara Home, Maisons du Monde, H&M Home, or El Corte Inglés
- Prices in euros, realistic for Spain
- Monthly plan: max 2-3 items per month, prioritized by impact
- Be specific and practical. Only suggest things actually purchasable.
- Return ONLY the JSON object.`;

    const response = await fetch('/api/analyze', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 4000,
        system: systemPrompt,
        messages: [{ role: 'user', content: [...imageContent, { type: 'text', text: 'Analyze these room photos and return the JSON.' }] }]
      })
    });

    const data = await response.json();
    if (!response.ok) throw new Error(data.error?.message || 'API error');

    const rawText = data.content.map(b => b.type === 'text' ? b.text : '').join('');
    const clean = rawText.replace(/```json|```/g, '').trim();
    const parsed = JSON.parse(clean);
    renderResults(parsed, images);
  } catch (err) {
    errorBox.textContent = 'Something went wrong: ' + err.message;
    errorBox.style.display = 'block';
  } finally {
    loading.style.display = 'none';
    analyzeBtn.disabled = false;
  }
});

function impactClass(p) {
  if (!p) return 'impact-medium';
  const l = p.toLowerCase();
  if (l === 'high') return 'impact-high';
  if (l === 'low') return 'impact-low';
  return 'impact-medium';
}

function searchUrl(q) {
  return 'https://www.google.com/search?q=' + encodeURIComponent(q);
}

function renderResults(data, images) {
  let html = `<div class="results-header">
    <h2>Your personalized plan</h2>
    <p>${data.rooms.length} room${data.rooms.length > 1 ? 's' : ''} analyzed · ${data.rooms.reduce((a, r) => a + (r.items_to_improve?.length || 0), 0)} improvements identified</p>
  </div>`;

  (data.rooms || []).forEach(room => {
    const imgSrc = images[room.image_index] ? 'data:' + images[room.image_index].mediaType + ';base64,' + images[room.image_index].data : '';
    const elements = (room.elements_present || []).map(e => `<span class="tag">${e}</span>`).join('');

    html += `<div class="room-section">
      <div class="room-header">
        ${imgSrc ? `<img class="room-img" src="${imgSrc}" alt="room">` : ''}
        <div>
          <div class="room-type">${room.room_type || 'Room'}</div>
          <div class="room-elements">${elements}</div>
        </div>
      </div>`;

    (room.items_to_improve || []).forEach(item => {
      const lc = item.options?.low_cost || {};
      const hc = item.options?.high_cost || {};
      html += `<div class="item-card">
        <div class="item-header">
          <div>
            <div class="item-name">${item.item || ''}</div>
            <div class="item-desc">${item.reason || ''}</div>
          </div>
          <span class="impact-badge ${impactClass(item.priority)}">${item.priority || 'medium'}</span>
        </div>
        <div class="options-row">
          <div class="option">
            <div class="option-label label-low">⬇ Low cost</div>
            <div class="option-name">${lc.product_name || '—'}</div>
            <div class="option-store">${lc.store || ''}</div>
            <div class="option-price">${lc.price_range || ''}</div>
            <button class="option-search" onclick="window.open('${searchUrl(lc.search_query || '')}', '_blank')" title="Search online">🔍 ${lc.search_query || ''}</button>
          </div>
          <div class="option">
            <div class="option-label label-high">⬆ Premium</div>
            <div class="option-name">${hc.product_name || '—'}</div>
            <div class="option-store">${hc.store || ''}</div>
            <div class="option-price">${hc.price_range || ''}</div>
            <button class="option-search" onclick="window.open('${searchUrl(hc.search_query || '')}', '_blank')" title="Search online">🔍 ${hc.search_query || ''}</button>
          </div>
        </div>
      </div>`;
    });

    html += `</div>`;
  });

  if (data.monthly_plan?.length) {
    html += `<div class="plan-section">
      <div class="plan-title">Monthly shopping plan</div>`;
    data.monthly_plan.forEach(month => {
      const chips = (month.purchases || []).map(p =>
        `<div class="month-item-chip"><span>${p.item}</span><span class="chip-room">${p.room} · ${p.option === 'low_cost' ? 'Budget' : 'Premium'}</span></div>`
      ).join('');
      html += `<div class="month-row">
        <div class="month-label">${month.month}</div>
        <div class="month-items">${chips}</div>
      </div>`;
    });
    html += `</div>`;
  }

  results.innerHTML = html;
  results.style.display = 'block';
  results.scrollIntoView({ behavior: 'smooth', block: 'start' });
}
</script>
</body>
</html>
